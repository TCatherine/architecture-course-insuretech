http {
    # Настройка upstream для балансировки нагрузки
    upstream backend_servers {
        server backend1.example.com;
        server backend2.example.com;
        server backend3.example.com;
    }

    # Определение зоны ограничения запросов:
    # Имя зоны: partner_limit, размер: 10 МБ, лимит: 10 запросов в минуту (10r/m)
    limit_req_zone $binary_remote_addr zone=partner_limit:10m rate=10r/m;

    server {
        listen 80;

        # Изменение стандартного кода ответа (503) на 429 (Too Many Requests)
        limit_req_status 429;

        location / {
            # Применение ограничения запросов к текущему location
            limit_req zone=partner_limit;

            proxy_pass http://backend_servers;
        }
    }
}
